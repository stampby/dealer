<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="20" fill="#0d1117"/>
  <!-- Playing cards fanned out -->
  <rect x="38" y="22" width="24" height="36" rx="3" fill="none" stroke="#e040fb" stroke-width="1.5" transform="rotate(-15 50 40)"/>
  <rect x="48" y="20" width="24" height="36" rx="3" fill="none" stroke="#e040fb" stroke-width="1.5"/>
  <rect x="58" y="22" width="24" height="36" rx="3" fill="none" stroke="#e040fb" stroke-width="1.5" transform="rotate(15 70 40)"/>
  <!-- Card symbols -->
  <text x="52" y="38" font-family="serif" font-size="14" fill="#e040fb" font-weight="bold">?</text>
  <text x="68" y="42" font-family="serif" font-size="10" fill="#e040fb" opacity="0.7">A</text>
  <!-- Dice -->
  <rect x="28" y="68" width="16" height="16" rx="3" fill="none" stroke="#e040fb" stroke-width="1.5" transform="rotate(-10 36 76)"/>
  <circle cx="33" cy="73" r="1.5" fill="#e040fb"/>
  <circle cx="39" cy="79" r="1.5" fill="#e040fb"/>
  <!-- AI brain circuit -->
  <circle cx="82" cy="74" r="12" fill="none" stroke="#e040fb" stroke-width="1.5"/>
  <circle cx="82" cy="74" r="4" fill="#e040fb" opacity="0.4"/>
  <line x1="82" y1="62" x2="82" y2="66" stroke="#e040fb" stroke-width="1" opacity="0.6"/>
  <line x1="82" y1="82" x2="82" y2="86" stroke="#e040fb" stroke-width="1" opacity="0.6"/>
  <line x1="70" y1="74" x2="74" y2="74" stroke="#e040fb" stroke-width="1" opacity="0.6"/>
  <line x1="90" y1="74" x2="94" y2="74" stroke="#e040fb" stroke-width="1" opacity="0.6"/>
  <!-- Connecting dots -->
  <circle cx="56" cy="64" r="1.5" fill="#e040fb" opacity="0.5"/>
  <circle cx="64" cy="60" r="1" fill="#e040fb" opacity="0.4"/>
  <circle cx="48" cy="72" r="1" fill="#e040fb" opacity="0.3"/>
  <!-- Label -->
  <text x="64" y="108" text-anchor="middle" font-family="monospace" font-size="10" fill="#e040fb" font-weight="bold">dealer</text>
</svg>
